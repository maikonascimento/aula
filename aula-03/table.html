<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tabela</title>
  </head>
  <body>
    <h1>Tabela de Dados</h1>
    <table border="1">
      <caption>
        Horário do Curso Web
      </caption>
      <thead>
        <tr>
          <th>Horario</th>
          <th>Seg</th>
          <th>Ter</th>
          <th>Qua</th>
          <th>Qui</th>
          <th>Sex</th>
        </tr>
      </thead>
      <tbody align="center">
        <tr>
          <th>08:00</th>
          <td>HTML</td>
          <td>CSS</td>
          <td rowspan="2">Projeto</td>
          <td>HTML</td>
          <td>CSS</td>
        </tr>
        <tr>
          <th>09:00</th>
          <td>HTML</td>
          <td>CSS</td>
          <td>JS</td>
          <td>JS</td>
        </tr>
        <tr>
          <th>10:00</th>
          <td colspan="5">INTERVALO</td>
        </tr>
        <tr>
          <th>10:30</th>
          <td>JS</td>
          <td>JS</td>
          <td>HTML</td>
          <td>CSS</td>
          <td>Projeto</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
